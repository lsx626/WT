<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>此间循迹 | 裁判端</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <header class="hero">
      <p class="tag">Ci Jian Xun Ji</p>
      <h1>此间循迹 · 裁判端</h1>
      <p class="subtitle">放行地点并记录体育活动加分，页面自动刷新同步。</p>
      <p class="portal-link"><a href="/">返回玩家端</a></p>
    </header>

    <main class="layout">
      <section class="card" id="judge-login-card">
        <h2>裁判端登录</h2>
        <form id="judge-login-form">
          <label>
            输入六位密码
            <input id="judge-password" type="password" maxlength="6" minlength="6" required />
          </label>
          <button type="submit">登录裁判端</button>
        </form>
        <div id="judge-login-result" class="result"></div>
      </section>

      <section class="card" id="release-control-card" hidden>
        <h2>放行与加分</h2>
        <div class="card-subtitle"><button id="judge-logout-btn" class="secondary-btn" type="button">退出裁判端</button></div>
        <form id="release-next-form">
          <label>
            选择小组
            <select id="release-team" required></select>
          </label>
          <label>
            地点体育活动加分
            <select id="release-points" required>
              <option value="1">+1 分</option>
              <option value="2">+2 分</option>
              <option value="3">+3 分</option>
              <option value="4">+4 分</option>
            </select>
          </label>
          <button type="submit">记录加分并放行下一地点</button>
        </form>
        <div id="release-result" class="result"></div>

        <h2>误选组别解锁</h2>
        <form id="team-switch-setting-form">
          <button id="team-switch-setting-btn" type="submit">关闭玩家重选入口</button>
        </form>
        <div id="team-switch-setting-result" class="result"></div>
        <form id="team-switch-code-form">
          <button type="submit">生成一次性重选码</button>
        </form>
        <div id="team-switch-code-result" class="result"></div>
      </section>

      <section class="card wide" id="team-status-card" hidden>
        <h2>小组进度</h2>
        <div id="team-status-list" class="stations"></div>
      </section>
    </main>

    <script src="judge.js"></script>
  </body>
</html>
